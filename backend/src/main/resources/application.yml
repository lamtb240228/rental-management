spring:
  config:
    import: optional:file:.env[.properties],optional:file:../.env[.properties]
  application:
    name: rental-management
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:${POSTGRES_PORT:45432}/${POSTGRES_DB:rental_management_datn1_db}}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_APP_USER:rental_management_app}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_APP_PASSWORD}}
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  jackson:
    default-property-inclusion: non_null

server:
  port: ${SERVER_PORT:8080}

app:
  demo-data:
    enabled: ${DEMO_DATA_ENABLED:false}
  jwt:
    secret: ${JWT_SECRET}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:15}
  refresh-token:
    expiration-days: ${REFRESH_TOKEN_EXPIRATION_DAYS:7}
    token-bytes: 32
    cookie-name: rental_refresh
    cookie-path: /api/auth
    cookie-secure: false
    cookie-same-site: ${REFRESH_COOKIE_SAME_SITE:Strict}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

debug: false

logging:
  level:
    root: INFO
    org.springframework: INFO
    org.hibernate.SQL: WARN
